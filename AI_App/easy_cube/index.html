<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Easy Cube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script type="module" src="https://pyscript.net/latest/pyscript.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js"
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-gray-900 text-gray-100">
    <div class="max-w-7xl mx-auto p-4 space-y-4">
      <header class="flex items-center justify-between">
        <h1 class="text-xl font-semibold">Easy Cube</h1>
      </header>

      <section class="bg-gray-800/60 rounded-lg p-4 shadow">
        <div class="flex flex-wrap gap-3 items-end">
          <label for="cubeCount" class="block">
            <span class="block text-sm mb-1">输入立方体数量</span>
            <input
              id="cubeCount"
              type="number"
              min="1"
              value="8"
              aria-label="输入立方体数量"
              tabindex="0"
              class="px-3 py-2 rounded border border-gray-700 bg-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </label>
          <button
            id="btnGenerate"
            aria-label="生成立方体"
            tabindex="0"
            class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500 focus:ring-2 focus:ring-indigo-400"
          >
            生成
          </button>
          <button
            id="btnArrange"
            aria-label="还原到默认位置"
            tabindex="0"
            class="px-4 py-2 rounded bg-teal-600 hover:bg-teal-500 focus:ring-2 focus:ring-teal-400"
          >
            还原位置
          </button>
          <span id="status" class="text-sm text-gray-400">准备就绪</span>
        </div>
      </section>

      <section class="relative bg-gray-800/60 rounded-lg shadow overflow-hidden">
        <div id="canvas-container" class="w-full h-[640px]" aria-label="三维画布" tabindex="0"></div>
      </section>
    </div>

    <py-config>
    </py-config>
    <py-script src="AI_cube.py"></py-script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

      const container = document.getElementById("canvas-container");
      const statusEl = document.getElementById("status");
      const btnGenerate = document.getElementById("btnGenerate");
      const btnArrange = document.getElementById("btnArrange");
      const inputN = document.getElementById("cubeCount");

      let scene, camera, renderer, controls, raycaster;
      let dragging = false;
      let selected = null;
      let dragPlane = new THREE.Plane();
      const pointer = new THREE.Vector2();
      const offset = new THREE.Vector3();
      const intersectPoint = new THREE.Vector3();
      const WIDTH = 1;
      const HEIGHT = 2;
      const DEPTH = 2;

      let cubes = [];
      let cubeEdges = [];
      let blockOutline = null;
      let ground;
      let defaultPositions = []; // 保存默认位置

      const setStatus = (msg) => {
        statusEl.textContent = msg;
      };

      const initScene = () => {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a); // slate-900

        const aspect = container.clientWidth / container.clientHeight;
        camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
        camera.position.set(6, 6, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.target.set(0, 0.5, 0);

        // Lights
        const ambi = new THREE.AmbientLight(0xffffff, 0.35);
        scene.add(ambi);
        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(5, 8, 4);
        dir.castShadow = true;
        dir.shadow.mapSize.set(1024, 1024);
        scene.add(dir);

        // Ground to receive shadows
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({
          color: 0x111827, // gray-900
          roughness: 1,
          metalness: 0,
        });
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid - aligned to smallest dimension or generic unit
        const grid = new THREE.GridHelper(40, 40, 0x374151, 0x1f2937);
        scene.add(grid);

        // Raycaster
        raycaster = new THREE.Raycaster();

        window.addEventListener("resize", handleResize);
        renderer.domElement.addEventListener("pointerdown", handlePointerDown);
        renderer.domElement.addEventListener("pointermove", handlePointerMove);
        renderer.domElement.addEventListener("pointerup", handlePointerUp);
        renderer.domElement.addEventListener("pointerleave", handlePointerUp);
        renderer.domElement.addEventListener("wheel", handleWheel, { passive: false });

        animate();
      };

      const handleResize = () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      };

      const getIntersects = (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        return raycaster.intersectObjects(cubes, false);
      };

      const handlePointerDown = (event) => {
        const intersects = getIntersects(event);
        if (!intersects.length) return;
        selected = intersects[0].object;
        dragging = true;
        controls.enabled = false;
        // 使用相机朝向作为拖拽平面法向量，支持三轴移动
        const cameraDirection = new THREE.Vector3();
        camera.getWorldDirection(cameraDirection);
        const d = -cameraDirection.dot(selected.position);
        dragPlane.set(cameraDirection, d);
        raycaster.ray.intersectPlane(dragPlane, intersectPoint);
        offset.copy(intersectPoint).sub(selected.position);
      };

      const handlePointerMove = (event) => {
        if (!dragging || !selected) return;
        raycaster.setFromCamera(updatePointer(event), camera);
        if (raycaster.ray.intersectPlane(dragPlane, intersectPoint)) {
          const desired = intersectPoint.sub(offset);
          
          // 获取当前旋转后的尺寸
          const currentBox = new THREE.Box3().setFromObject(selected);
          const size = new THREE.Vector3();
          currentBox.getSize(size);

          // 基础对齐逻辑：使包围盒的最小点（左下角）对齐到整数网格
          // 我们先计算如果中心在 desired 时，min 点的位置，然后对 min 点取整
          const halfSize = size.clone().multiplyScalar(0.5);
          const currentMin = desired.clone().sub(halfSize);
          
          let snapX = Math.round(currentMin.x) + halfSize.x;
          let snapY = Math.round(currentMin.y) + halfSize.y;
          let snapZ = Math.round(currentMin.z) + halfSize.z;
          
          // 优化吸附对齐效果：当靠近其他立方体时自动对齐
          const snapThreshold = 0.3; 
          cubes.forEach((cube) => {
            if (cube === selected) return;
            
            const otherBox = new THREE.Box3().setFromObject(cube);
            const otherSize = new THREE.Vector3();
            otherBox.getSize(otherSize);

            // X轴吸附
            if (Math.abs(otherBox.min.x - (snapX - halfSize.x)) < snapThreshold) {
              snapX = otherBox.min.x + halfSize.x;
            } else if (Math.abs(otherBox.max.x - (snapX - halfSize.x)) < snapThreshold) {
              snapX = otherBox.max.x + halfSize.x;
            }
            
            // Y轴吸附（允许堆叠）
            if (Math.abs(otherBox.min.y - (snapY - halfSize.y)) < snapThreshold) {
              snapY = otherBox.min.y + halfSize.y;
            } else if (Math.abs(otherBox.max.y - (snapY - halfSize.y)) < snapThreshold) {
              snapY = otherBox.max.y + halfSize.y;
            }
            
            // Z轴吸附
            if (Math.abs(otherBox.min.z - (snapZ - halfSize.z)) < snapThreshold) {
              snapZ = otherBox.min.z + halfSize.z;
            } else if (Math.abs(otherBox.max.z - (snapZ - halfSize.z)) < snapThreshold) {
              snapZ = otherBox.max.z + halfSize.z;
            }
          });
          
          selected.position.set(snapX, snapY, snapZ);
          updateBlockOutline();
        }
      };

      const updatePointer = (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        return pointer;
      };

      const snapToGrid = (mesh) => {
        if (!mesh) return;
        // 先确保位置在合理的整数附近（特别是拖拽松开后）
        mesh.position.x = Math.round(mesh.position.x * 2) / 2;
        mesh.position.y = Math.round(mesh.position.y * 2) / 2;
        mesh.position.z = Math.round(mesh.position.z * 2) / 2;

        // 重新计算世界包围盒，确保底面和侧面对齐到整数
        const box = new THREE.Box3().setFromObject(mesh);
        const dx = Math.round(box.min.x) - box.min.x;
        const dy = Math.round(box.min.y) - box.min.y;
        const dz = Math.round(box.min.z) - box.min.z;
        
        mesh.position.x += dx;
        mesh.position.y += dy;
        mesh.position.z += dz;

        // 确保底面不低于地面
        const finalBox = new THREE.Box3().setFromObject(mesh);
        if (finalBox.min.y < 0) {
          mesh.position.y -= finalBox.min.y;
        }
      };

      const handlePointerUp = () => {
        if (!dragging || !selected) {
          dragging = false;
          controls.enabled = true;
          return;
        }
        dragging = false;
        controls.enabled = true;
        
        // 自动对齐到网格
        snapToGrid(selected);
        
        updateBlockOutline();
        selected = null;
      };

      const handleWheel = (event) => {
        if (!selected) return;
        event.preventDefault();
        
        // 获取当前旋转后的尺寸
        const currentBox = new THREE.Box3().setFromObject(selected);
        const size = new THREE.Vector3();
        currentBox.getSize(size);
        const stepY = Math.round(size.y);
        
        // 滚轮移动高度
        const dir = Math.sign(event.deltaY);
        const newY = selected.position.y - dir * stepY;
        
        // 检查是否有其他立方体在目标位置
        let finalY = newY;
        const snapThreshold = 0.3;
        cubes.forEach((cube) => {
          if (cube === selected) return;
          const otherBox = new THREE.Box3().setFromObject(cube);
          if (Math.abs(otherBox.min.y - (newY - size.y/2)) < snapThreshold && 
              Math.abs(cube.position.x - selected.position.x) < size.x * 0.5 &&
              Math.abs(cube.position.z - selected.position.z) < size.z * 0.5) {
            // 如果目标位置有其他立方体，堆叠在上方或下方
            if (dir > 0) {
              finalY = otherBox.min.y - size.y/2;
            } else {
              finalY = otherBox.max.y + size.y/2;
            }
          }
        });
        
        selected.position.y = finalY;
        // 自动对齐
        snapToGrid(selected);
        updateBlockOutline();
      };

      const createCube = (idx) => {
        const geo = new THREE.BoxGeometry(WIDTH, HEIGHT, DEPTH);
        
        // 更鲜亮但柔和的配色方案
        const brightSoftColors = [
          0xFF9AA2, 0xFFB3BA, 0xFFC8C8, 0xFFD6A5, 0xFFE5B4,
          0xFFF4C4, 0xE8F5C8, 0xC8E6C9, 0xB8E6D1, 0xB8E0E6,
          0xC8E0F0, 0xD6E3F0, 0xE3D6F0, 0xF0D6E3, 0xF5D6E8,
          0xFFB8D1, 0xFFC8E0, 0xFFD8E8, 0xFFE8F0, 0xFFF0F8,
          0xF0E8FF, 0xE0D8FF, 0xD0C8FF, 0xC8D0FF, 0xD0E0FF,
          0xD8F0FF, 0xE0F8FF, 0xE8FFF8, 0xF0FFF0, 0xF8FFF8
        ];
        
        const colorHex = brightSoftColors[idx % brightSoftColors.length];
        
        const mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(colorHex),
          roughness: 0.6,
          metalness: 0.1,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true;
        mesh.position.set(0, HEIGHT / 2, 0);
        scene.add(mesh);
        cubes.push(mesh);

        const edges = new THREE.EdgesGeometry(geo);
        const line = new THREE.LineSegments(
          edges,
          new THREE.LineBasicMaterial({ color: 0x111111 })
        );
        line.position.copy(mesh.position);
        line.userData.follow = mesh;
        scene.add(line);
        cubeEdges.push(line);
      };

      const clearCubes = () => {
        cubeEdges.forEach((line) => scene.remove(line));
        cubes.forEach((c) => scene.remove(c));
        cubeEdges = [];
        cubes = [];
        if (blockOutline) {
          scene.remove(blockOutline);
          blockOutline = null;
        }
      };

      const jitterAroundCenter = (index, total) => {
        const spacingX = WIDTH * 2;
        const spacingY = HEIGHT * 1.5;
        const spacingZ = DEPTH * 2;
        
        let gridSize = Math.ceil(Math.cbrt(total));
        while (gridSize * gridSize * gridSize < total) {
          gridSize++;
        }
        
        const layer = Math.floor(index / (gridSize * gridSize));
        const layerIndex = index % (gridSize * gridSize);
        const row = Math.floor(layerIndex / gridSize);
        const col = layerIndex % gridSize;
        
        const centerOffset = (gridSize - 1) / 2;
        
        const x = Math.round((col - centerOffset) * spacingX / WIDTH) * WIDTH;
        const y = Math.max(HEIGHT / 2, Math.round((layer * spacingY + HEIGHT / 2) / HEIGHT) * HEIGHT);
        const z = Math.round((row - centerOffset) * spacingZ / DEPTH) * DEPTH;
        
        return new THREE.Vector3(x, y, z);
      };

      const generateCubes = (n) => {
        clearCubes();
        defaultPositions = [];
        for (let i = 0; i < n; i++) {
          createCube(i);
          const defaultPos = jitterAroundCenter(i, n);
          cubes[i].position.copy(defaultPos);
          cubeEdges[i].position.copy(cubes[i].position);
          defaultPositions.push(defaultPos.clone());
        }
        setStatus(`已生成 ${n} 个 1x2x2 的长方体`);
        updateBlockOutline();
      };

      const autoArrange = () => {
        if (defaultPositions.length === 0 || defaultPositions.length !== cubes.length) {
          setStatus("没有可还原的默认位置");
          return;
        }
        defaultPositions.forEach((pos, i) => {
          if (!cubes[i]) return;
          cubes[i].position.copy(pos);
          cubeEdges[i].position.copy(cubes[i].position);
        });
        updateBlockOutline();
        setStatus("已还原到默认位置");
      };

      const updateBlockOutline = () => {
        cubeEdges.forEach((line, i) => {
          const follow = line.userData.follow;
          if (follow) line.position.copy(follow.position);
        });
        
        const pts = cubes.map((c) => c.position.clone());
        if (pts.length === 0) return;

        const min = new THREE.Vector3(+Infinity, +Infinity, +Infinity);
        const max = new THREE.Vector3(-Infinity, -Infinity, -Infinity);
        pts.forEach((p) => {
          min.min(p);
          max.max(p);
        });
        
        min.x -= WIDTH / 2;
        min.y -= HEIGHT / 2;
        min.z -= DEPTH / 2;
        max.x += WIDTH / 2;
        max.y += HEIGHT / 2;
        max.z += DEPTH / 2;

        // 仅在紧密排列时显示轮廓 (这里简化逻辑，只要有物体就显示整体包围盒)
        if (!blockOutline) {
          const boxGeo = new THREE.BoxGeometry(max.x - min.x, max.y - min.y, max.z - min.z);
          const edges = new THREE.EdgesGeometry(boxGeo);
          blockOutline = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x10b981 }));
          blockOutline.position.set((min.x + max.x) / 2, (min.y + max.y) / 2, (min.z + max.z) / 2);
          scene.add(blockOutline);
        } else {
          blockOutline.geometry.dispose();
          const boxGeo = new THREE.BoxGeometry(max.x - min.x, max.y - min.y, max.z - min.z);
          blockOutline.geometry = new THREE.EdgesGeometry(boxGeo);
          blockOutline.position.set((min.x + max.x) / 2, (min.y + max.y) / 2, (min.z + max.z) / 2);
        }
      };

      const animate = () => {
        requestAnimationFrame(animate);
        cubeEdges.forEach((line) => {
          const follow = line.userData.follow;
          if (follow) line.position.copy(follow.position);
        });
        controls.update();
        renderer.render(scene, camera);
      };

      const handleGenerate = () => {
        const n = parseInt(inputN.value, 10);
        if (!Number.isInteger(n) || n <= 0) {
          setStatus("请输入大于 0 的整数");
          return;
        }
        generateCubes(n);
      };
      btnGenerate.addEventListener("click", handleGenerate);
      btnGenerate.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") handleGenerate();
      });
      btnArrange.addEventListener("click", autoArrange);
      btnArrange.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") autoArrange();
      });
      document.addEventListener("keydown", (e) => {
        if (selected) {
          // 获取当前旋转后的尺寸
          const currentBox = new THREE.Box3().setFromObject(selected);
          const size = new THREE.Vector3();
          currentBox.getSize(size);
          const stepY = Math.round(size.y);

          if (e.key === "ArrowUp") {
            selected.position.y += stepY;
          } else if (e.key === "ArrowDown") {
            selected.position.y -= stepY;
          } else if (e.key.toLowerCase() === "x") {
            // 沿 X 轴旋转 90 度并对齐
            selected.rotateX(Math.PI / 2);
            snapToGrid(selected);
          } else if (e.key.toLowerCase() === "y") {
            // 沿 Y 轴旋转 90 度并对齐
            selected.rotateY(Math.PI / 2);
            snapToGrid(selected);
          } else if (e.key.toLowerCase() === "z") {
            // 沿 Z 轴旋转 90 度并对齐
            selected.rotateZ(Math.PI / 2);
            snapToGrid(selected);
          }
          updateBlockOutline();
        }
      });

      window.generateCubes = generateCubes;
      window.autoArrange = autoArrange;

      initScene();
      generateCubes(parseInt(inputN.value, 10));
      setStatus("提示：拖拽移动；滚轮/方向键调高低；按 X/Y/Z 键旋转选中的长方体");

    </script>
  </body>
</html>
